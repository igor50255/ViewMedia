<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #0a0a0c;
    --accent: #00e5ff;
    --accent2:#ff2d6b;
    --muted:  #3a4055;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    user-select: none;
  }

  /* ─── SPLASH ─── */
  #splash {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    background: var(--bg);
    z-index: 10;
    transition: opacity .4s, visibility .4s;
  }
  #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  #splash::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .corner { position: absolute; width: 20px; height: 20px; opacity: .35; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); }
  .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
  .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
  .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner.br { bottom: 16px; right: 16px; transform: scale(-1); }
  .corner.tl { top: 16px; left: 16px; }

  .splash-logo { position: relative; width: 110px; height: 110px; }
  .splash-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    animation: spin 3s linear infinite;
  }
  .splash-ring:nth-child(1) { border-top-color: var(--accent); border-right-color: var(--accent); animation-duration: 2.4s; }
  .splash-ring:nth-child(2) { inset: 10px; border-bottom-color: var(--accent2); border-left-color: var(--accent2); animation-duration: 1.8s; animation-direction: reverse; }
  .splash-ring:nth-child(3) { inset: 22px; border-top-color: rgba(0,229,255,.4); animation-duration: 3.6s; }
  .splash-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .splash-icon svg { width: 32px; height: 32px; fill: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .splash-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--muted);
  }

  .hint-drop {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 28px;
    border: 1px dashed var(--muted);
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    transition: border-color .2s, color .2s, box-shadow .2s;
    letter-spacing: 1px;
  }
  .hint-drop svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  .splash-drag-active .hint-drop {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(0,229,255,.15);
  }

  .hint-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: #2a2e3d;
    margin-top: -12px;
  }

  /* ─── VIDEO ─── */
  #video {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: block;
    z-index: 1;
    transition: right 0.3s ease;
    object-fit: contain;
  }
  #video::-webkit-media-controls-fullscreen-button {
    display: none;
  }
  body.playlist-open #video {
    right: 320px;
    width: calc(100% - 320px);
  }

  /* ─── PLAYLIST BUTTON ─── */
  #playlist-btn {
    position: fixed;
    top: 14px;
    right: 16px;
    width: 36px;
    height: 36px;
    background: rgba(10, 10, 12, 0.85);
    border: 1px solid var(--muted);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2147483647;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
  }
  #playlist-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #playlist-btn:hover {
    border-color: var(--accent);
    background: rgba(0, 229, 255, 0.1);
  }
  #playlist-btn svg {
    width: 18px;
    height: 18px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 2;
    transition: stroke 0.2s;
  }
  #playlist-btn:hover svg {
    stroke: var(--accent);
  }

  /* ─── PLAYLIST PANEL ─── */
  #playlist-panel {
    position: fixed;
    top: 0;
    right: -320px;
    width: 320px;
    height: 100%;
    background: rgba(10, 10, 12, 0.95);
    border-left: 1px solid var(--muted);
    z-index: 2147483646;
    transition: right 0.3s ease;
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
  }
  #playlist-panel.open {
    right: 0;
  }

  .playlist-header {
    padding: 20px;
    padding-right: 60px;
    border-bottom: 1px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 12px;
  }
  .playlist-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .playlist-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent);
    opacity: 0.7;
    margin-left: 8px;
  }

  .header-buttons {
    display: flex;
    gap: 8px;
  }

  /* ─── HELP BUTTON ─── */
  .help-btn {
    width: 36px;
    height: 36px;
    background: rgba(58, 64, 85, 0.3);
    border: 1px solid var(--muted);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    padding: 0;
    outline: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: var(--muted);
    font-weight: bold;
  }
  .help-btn:hover {
    background: rgba(0, 229, 255, 0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── PLAYBACK MODE BUTTON ─── */
  .playback-mode-btn {
    width: 36px;
    height: 36px;
    background: rgba(0, 229, 255, 0.08);
    border: 1px solid var(--accent);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    padding: 0;
    outline: none;
  }
  .playback-mode-btn:hover {
    background: rgba(0, 229, 255, 0.15);
    border-color: var(--accent);
    transform: scale(1.05);
  }
  .playback-mode-btn svg {
    width: 18px;
    height: 18px;
    fill: var(--accent);
    transition: all 0.2s;
  }
  .playback-mode-btn:hover svg {
    filter: drop-shadow(0 0 4px var(--accent));
  }

  .playlist-items {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .playlist-items.hidden {
    display: none;
  }

  /* ─── HELP CONTENT ─── */
  .help-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: none;
  }
  .help-content.visible {
    display: block;
  }
  .help-section {
    margin-bottom: 24px;
  }
  .help-section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .help-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(58, 64, 85, 0.3);
  }
  .help-item:last-child {
    border-bottom: none;
  }
  .help-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(0, 229, 255, 0.1);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--accent);
  }
  .help-desc {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    margin-left: 12px;
  }
  .playlist-item {
    padding: 12px 14px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .playlist-item:hover {
    background: rgba(58, 64, 85, 0.3);
    border-color: var(--muted);
  }
  .playlist-item.active {
    background: rgba(0, 229, 255, 0.1);
    border-color: var(--accent);
  }
  .playlist-item-index {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 24px;
  }
  .playlist-item.active .playlist-item-index {
    color: var(--accent);
  }
  .playlist-item-name {
    font-size: 13px;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .playlist-item.active .playlist-item-name {
    color: var(--accent);
    font-weight: 500;
  }

  .playlist-items::-webkit-scrollbar {
    width: 6px;
  }
  .playlist-items::-webkit-scrollbar-track {
    background: transparent;
  }
  .playlist-items::-webkit-scrollbar-thumb {
    background: var(--muted);
    border-radius: 3px;
  }
  .playlist-items::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }

  /* ─── DRAG OVERLAY ─── */
  #drag-overlay {
    position: absolute; inset: 0;
    border: 3px solid var(--accent);
    background: rgba(0,229,255,.06);
    display: none;
    align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 20;
  }
  #drag-overlay.visible { display: flex; }
  .drop-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 14px var(--accent);
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="splash-logo">
    <div class="splash-ring"></div>
    <div class="splash-ring"></div>
    <div class="splash-ring"></div>
    <div class="splash-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
  </div>

  <div class="splash-title">VPLAY</div>

  <div class="hint-drop">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Перетащите видеофайл
  </div>
  <div class="hint-sub">drag &amp; drop · cmd args · ctrl+d fullscreen</div>
</div>

<!-- VIDEO -->
<video id="video" controls></video>

<!-- PLAYLIST BUTTON -->
<button id="playlist-btn" title="Плейлист">
  <svg viewBox="0 0 24 24">
    <line x1="8" y1="6" x2="21" y2="6"/>
    <line x1="8" y1="12" x2="21" y2="12"/>
    <line x1="8" y1="18" x2="21" y2="18"/>
    <line x1="3" y1="6" x2="3.01" y2="6"/>
    <line x1="3" y1="12" x2="3.01" y2="12"/>
    <line x1="3" y1="18" x2="3.01" y2="18"/>
  </svg>
</button>

<!-- PLAYLIST PANEL -->
<div id="playlist-panel">
  <div class="playlist-header">
    <div>
      <span class="playlist-title">ПЛЕЙЛИСТ</span>
      <span class="playlist-count" id="playlist-count">0</span>
    </div>
    <div class="header-buttons">
      <button class="help-btn" id="help-btn" title="Справка">?</button>
      <button class="playback-mode-btn" id="playback-mode-btn" title="Режим: Зациклить текущее">
        <svg id="mode-icon" viewBox="0 0 24 24">
          <path d="M13,15V9H12L10,10V11H11.5V15M17,17H7V14L3,18L7,22V19H19V13H17M7,7H17V10L21,6L17,2V5H5V11H7V7Z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="playlist-items" id="playlist-items"></div>
  <div class="help-content" id="help-content">
    <div class="help-section">
      <div class="help-section-title">Навигация</div>
      <div class="help-item">
        <span class="help-key">N</span>
        <span class="help-desc">Следующее видео</span>
      </div>
      <div class="help-item">
        <span class="help-key">B</span>
        <span class="help-desc">Предыдущее видео</span>
      </div>
    </div>
    <div class="help-section">
      <div class="help-section-title">Управление</div>
      <div class="help-item">
        <span class="help-key">Space</span>
        <span class="help-desc">Пауза / Воспроизведение</span>
      </div>
      <div class="help-item">
        <span class="help-key">← / →</span>
        <span class="help-desc">Перемотка ±5 сек</span>
      </div>
      <div class="help-item">
        <span class="help-key">↑ / ↓</span>
        <span class="help-desc">Громкость</span>
      </div>
    </div>
    <div class="help-section">
      <div class="help-section-title">Режимы</div>
      <div class="help-item">
        <span class="help-key">Ctrl+D</span>
        <span class="help-desc">Полноэкранный режим</span>
      </div>
      <div class="help-item">
        <span class="help-key">Двойной клик</span>
        <span class="help-desc">Браузерный fullscreen</span>
      </div>
    </div>
  </div>
</div>

<!-- DRAG OVERLAY -->
<div id="drag-overlay">
  <span class="drop-label">ОТКРЫТЬ ФАЙЛ</span>
</div>

<script>
'use strict';

const splash      = document.getElementById('splash');
const video       = document.getElementById('video');
const dragOverlay = document.getElementById('drag-overlay');
const playlistBtn = document.getElementById('playlist-btn');
const playlistPanel = document.getElementById('playlist-panel');
const playlistItems = document.getElementById('playlist-items');
const playlistCount = document.getElementById('playlist-count');
const playbackModeBtn = document.getElementById('playback-mode-btn');
const modeIcon = document.getElementById('mode-icon');
const helpBtn = document.getElementById('help-btn');
const helpContent = document.getElementById('help-content');

let currentBlobUrl = null;
let playlist = [];
let currentIndex = -1;
let playbackMode = 'repeat-one';
let showingHelp = false;

video.addEventListener('dblclick', (e) => {
  e.preventDefault();
  e.stopPropagation();
});

// ─── HELP TOGGLE ──────────────────────────────────────────────────────

helpBtn.addEventListener('click', () => {
  showingHelp = !showingHelp;

  if (showingHelp) {
    playlistItems.classList.add('hidden');
    helpContent.classList.add('visible');
    document.querySelector('.playlist-title').textContent = 'СПРАВКА';
    playlistCount.style.display = 'none';
  } else {
    playlistItems.classList.remove('hidden');
    helpContent.classList.remove('visible');
    document.querySelector('.playlist-title').textContent = 'ПЛЕЙЛИСТ';
    playlistCount.style.display = 'inline';
  }
});

// ─── PLAYBACK MODE ────────────────────────────────────────────────────

const modes = {
  playlist: {
    icon: '<path d="M17 17H7V14L3 18L7 22V19H19V13H17M7 7H17V10L21 6L17 2V5H5V11H7V7Z"/>',
    tooltip: 'Режим: Автопереход'
  },
  'repeat-one': {
    icon: '<path d="M13,15V9H12L10,10V11H11.5V15M17,17H7V14L3,18L7,22V19H19V13H17M7,7H17V10L21,6L17,2V5H5V11H7V7Z"/>',
    tooltip: 'Режим: Зациклить текущее'
  },
  stop: {
    icon: '<path d="M18,18H6V6H18V18Z"/>',
    tooltip: 'Режим: Один раз'
  }
};

playbackModeBtn.addEventListener('click', () => {
  if (playbackMode === 'playlist') {
    playbackMode = 'repeat-one';
  } else if (playbackMode === 'repeat-one') {
    playbackMode = 'stop';
  } else {
    playbackMode = 'playlist';
  }

  updateModeButton();

  if (window.chrome?.webview)
    window.chrome.webview.postMessage('playback-mode:' + playbackMode);
});

function updateModeButton() {
  const mode = modes[playbackMode];
  modeIcon.innerHTML = mode.icon;
  playbackModeBtn.title = mode.tooltip;
}

// ─── PLAYLIST PANEL ───────────────────────────────────────────────────

playlistBtn.addEventListener('click', () => {
  playlistPanel.classList.toggle('open');
  document.body.classList.toggle('playlist-open');
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'n' || e.key === 'N' || e.code === 'KeyN') {
    e.preventDefault();
    if (window.chrome?.webview)
      window.chrome.webview.postMessage('key:next');
  } else if (e.key === 'b' || e.key === 'B' || e.code === 'KeyB') {
    e.preventDefault();
    if (window.chrome?.webview)
      window.chrome.webview.postMessage('key:prev');
  }
});

function updatePlaylist(items, activeIndex) {
  playlist = items;
  currentIndex = activeIndex;

  playlistCount.textContent = items.length;
  playlistItems.innerHTML = '';

  if (items.length > 0) {
    playlistBtn.classList.add('visible');
  } else {
    playlistBtn.classList.remove('visible');
  }

  items.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'playlist-item' + (index === activeIndex ? ' active' : '');
    div.innerHTML = `
      <div class="playlist-item-index">${index + 1}</div>
      <div class="playlist-item-name" title="${item}">${item}</div>
    `;
    div.addEventListener('click', () => {
      if (window.chrome?.webview)
        window.chrome.webview.postMessage('playlist:select:' + index);
    });
    playlistItems.appendChild(div);
  });

  if (activeIndex >= 0) {
    const activeEl = playlistItems.children[activeIndex];
    if (activeEl) {
      activeEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }
}

// ─── DRAG & DROP ──────────────────────────────────────────────────────

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop',     e => e.preventDefault());

document.addEventListener('dragenter', () => {
  splash.classList.add('splash-drag-active');
  dragOverlay.classList.add('visible');
});
document.addEventListener('dragleave', (e) => {
  if (e.relatedTarget === null) {
    splash.classList.remove('splash-drag-active');
    dragOverlay.classList.remove('visible');
  }
});

video.addEventListener('dragover',  e => { e.preventDefault(); dragOverlay.classList.add('visible'); });
video.addEventListener('dragleave', ()  => { dragOverlay.classList.remove('visible'); });

video.addEventListener('drop', (e) => {
  e.preventDefault();
  dragOverlay.classList.remove('visible');
  splash.classList.remove('splash-drag-active');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('video/')) return;
  loadBlob(file);
});

splash.addEventListener('dragover',  e => e.preventDefault());
splash.addEventListener('drop', (e) => {
  e.preventDefault();
  dragOverlay.classList.remove('visible');
  splash.classList.remove('splash-drag-active');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('video/')) return;
  loadBlob(file);
});

// ─── ЗАГРУЗКА ЧЕРЕЗ BLOB ──────────────────────────────────────────────

function loadBlob(file) {
  if (currentBlobUrl) {
    URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl = null;
  }

  video.pause();
  video.removeAttribute('src');
  video.load();

  if (window.chrome?.webview) {
    window.chrome.webview.postMessage('filename:' + file.name);
    // Отправляем текущий режим воспроизведения
    window.chrome.webview.postMessage('playback-mode:' + playbackMode);
  }

  setTimeout(() => {
    currentBlobUrl = URL.createObjectURL(file);
    video.src = currentBlobUrl;
    video.load();
    video.play().catch(() => {});
    splash.classList.add('hidden');
  }, 150);
}

// ─── ЗАГРУЗКА ЧЕРЕЗ HTTP ──────────────────────────────────────────────

window.loadVideo = function(url, name) {
  if (currentBlobUrl) {
    URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl = null;
  }

  video.pause();
  video.removeAttribute('src');
  video.load();

  setTimeout(() => {
    video.src = url + '?t=' + Date.now();
    video.load();
    video.play().catch(() => {});
    splash.classList.add('hidden');
  }, 150);
};

// ─── СООБЩАЕМ C# ──────────────────────────────────────────────────────

if (window.chrome?.webview) {
  window.chrome.webview.postMessage('ready');
  // Отправляем начальный режим
  window.chrome.webview.postMessage('playback-mode:repeat-one');
}

video.addEventListener('ended', () => {
  // Для blob URL обрабатываем зацикливание на уровне JS
  if (currentBlobUrl && playbackMode === 'repeat-one') {
    video.currentTime = 0;
    video.play().catch(() => {});
  } else if (window.chrome?.webview) {
    window.chrome.webview.postMessage('video:ended');
  }
});
</script>
</body>
