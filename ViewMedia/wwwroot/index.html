<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/icon/default.png">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="materialize/css/materialize.min.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/overlay.css">
  <link rel="stylesheet" href="css/left-menu.css">
  <title>Просмотр медиа на ПК</title>

</head>

<body>
  <!-- ОВЕРЛЕЙ ЗАГРУЗКИ -->
  <div id="loader-overlay" class="hidden">
    <div class="preloader-wrapper big active">
      <div class="spinner-layer spinner-blue-only">
        <div class="circle-clipper left">
          <div class="circle"></div>
        </div>
        <div class="gap-patch">
          <div class="circle"></div>
        </div>
        <div class="circle-clipper right">
          <div class="circle"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- INFORMATION WINDOW -->
  <div id="info-modal" class="modal">
    <div class="modal-content">
      <h5 id="info-modal-title">Информация</h5>
      <p id="info-modal-text"></p>
    </div>

    <div class="modal-footer">
      <button type="button" class="modal-close btn-flat">OK</button>
    </div>
  </div>
  <div class="app">
    <!-- ПРИЛОЖЕНИЕ -->

    <!-- Фиксированная верхняя панель -->
    <div class="navbar-fixed">
      <nav>
        <div class="nav-wrapper  cyan darken-4">
          <!-- Меню - гамбургер -->
          <a href="#" data-target="mobile-menu" class="sidenav-trigger">
            <i class="material-icons">menu</i>
          </a>
          <div id="nameActivSidenavMenu"></div>
        </div>
      </nav>
    </div>

    <!-- Выезжающее меню слева -->
    <ul class="sidenav" id="mobile-menu">
      <li><a href="#home">Главная</a></li>
      <li><a href="#services">Услуги</a></li>
      <li><a href="#contacts">Контакты</a></li>
    </ul>

    <script>


    </script>
    <script src="materialize/js/materialize.min.js"></script>

    <script src="js/app.js"></script>
    <script src="js/overlay.js"></script>
    <script src="js/fullscreen.js"></script>
    <script src="js/Initialization.js"></script>
    <script src="js/left-menu.js"></script>
    <script>
      
    </script>
</body>

</html>
